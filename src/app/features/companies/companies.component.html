<header class="page-header">
    <div class="header-titles">
        <h1>Companies Directory</h1>
        <p class="subtitle">Explore registered construction firms</p>
    </div>
</header>

<!-- Filtering / Search Bar section -->
<section class="controls-section">
    <form class="filter-form" ng-submit="ctrl.applyFilters()">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" ng-model="ctrl.filters.keyword" placeholder="Search companies by name..."
                class="filter-input search-input">
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-filter"></i> Search
        </button>
        <button type="button" class="btn btn-secondary" ng-click="ctrl.resetFilters()">
            Clear
        </button>
    </form>
</section>

<!-- Loading State -->
<div class="loading-state" ng-if="ctrl.loading">
    <div class="spinner"></div>
    <p>Loading companies...</p>
</div>

<!-- Empty State -->
<div class="empty-state" ng-if="!ctrl.loading && ctrl.companies.length === 0">
    <div class="empty-icon"><i class="fa-regular fa-folder-open"></i></div>
    <h3>No companies found</h3>
    <p>Try adjusting your search criteria.</p>
</div>

<!-- Companies Grid -->
<section class="projects-grid" ng-if="!ctrl.loading && ctrl.companies.length > 0">
    <article class="project-card" ng-repeat="company in ctrl.companies">
        <div class="card-header">
            <h3 class="project-title">{{ company.company_name }}</h3>
        </div>

        <div class="card-body">
            <!-- Future link to projects for this company -->
            <div class="info-row" style="margin-top: 15px;">
                <a href="#!/projects?company_name={{ company.company_name }}" class="btn btn-secondary btn-sm"
                    style="width: 100%; text-align: center;">
                    <i class="fa-solid fa-layer-group"></i> View Projects
                </a>
            </div>
        </div>
    </article>
</section>

<!-- Shared Pagination Component -->
<app-pagination total="ctrl.total" current-page="ctrl.currentPage" per-page="ctrl.perPage"
    on-page-change="ctrl.changePage(page)" on-per-page-change="ctrl.onPerPageChange(perPage)">
</app-pagination>
